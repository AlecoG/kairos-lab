app = "kairoslab-api"
primary_region = "mia"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"
  min_machines_running = 0

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health" 
 
[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
 